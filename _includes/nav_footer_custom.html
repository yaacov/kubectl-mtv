<button class="btn-reset theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
  <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </svg>
  <span class="theme-label">Dark mode</span>
</button>

<style>
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    margin: 0.75rem 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    color: inherit;
    opacity: 0.7;
    transition: opacity 0.15s;
    background: none;
    border: none;
    width: 100%;
  }
  .theme-toggle:hover {
    opacity: 1;
  }
</style>

<script>
if (!window._themeToggleInit) {
  window._themeToggleInit = true;

  document.addEventListener('DOMContentLoaded', function() {
    var buttons = document.querySelectorAll('.theme-toggle');

    function isDark() {
      return localStorage.getItem('jtd-theme') === 'forklift';
    }

    function updateAllButtons() {
      buttons.forEach(function(btn) {
        var sun = btn.querySelector('.theme-icon-sun');
        var moon = btn.querySelector('.theme-icon-moon');
        var label = btn.querySelector('.theme-label');
        if (isDark()) {
          sun.style.display = '';
          moon.style.display = 'none';
          label.textContent = 'Light mode';
        } else {
          sun.style.display = 'none';
          moon.style.display = '';
          label.textContent = 'Dark mode';
        }
      });
    }

    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (isDark()) {
          localStorage.removeItem('jtd-theme');
        } else {
          localStorage.setItem('jtd-theme', 'forklift');
        }
        window.location.reload();
      });
    });

    updateAllButtons();
  });
}
</script>
